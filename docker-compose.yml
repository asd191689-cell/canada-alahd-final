version: "3.9"

services:
  db:
    image: postgres:15
    container_name: canada_alahd_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: canada_alahd
    ports:
      - "5432:5432"
    volumes:
      - ./db:/docker-entrypoint-initdb.d

  backend:
    build: ./backend
    container_name: canada_alahd_backend
    restart: always
    ports:
      - "4000:4000"
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: canada_alahd_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend
